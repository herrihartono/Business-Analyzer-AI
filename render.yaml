services:
  - type: web
    name: smartbiz-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./smartbiz.db
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: REDIS_URL
        value: ""
      - key: SECRET_KEY
        generateValue: true
      - key: UPLOAD_DIR
        value: uploads
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.0"
